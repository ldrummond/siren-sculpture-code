<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sculpture BLE Provisioning</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f7f7f2; color: #1c2420; }
    main { max-width: 720px; margin: 0 auto; padding: 20px; }
    h1 { font-size: 1.5rem; margin: 0 0 12px; }
    section, form { border-top: 1px solid #d6d8ce; padding: 16px 0; }
    label { display: block; margin: 12px 0; font-weight: 600; }
    input { box-sizing: border-box; display: block; width: 100%; min-height: 44px; margin-top: 6px; padding: 8px 10px; border: 1px solid #aab2ab; border-radius: 6px; font: inherit; }
    button { min-height: 44px; border: 0; border-radius: 6px; padding: 0 14px; background: #174135; color: white; font: inherit; cursor: pointer; }
    button.secondary { background: white; color: #174135; border: 1px solid #174135; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    pre { white-space: pre-wrap; background: #151816; color: #e9efe9; border-radius: 6px; padding: 12px; overflow-x: auto; }
  </style>
</head>
<body>
<main>
  <h1>Sculpture BLE Provisioning</h1>
  <section class="row">
    <button onclick="connectBle()">Connect</button>
    <button class="secondary" onclick="sendCommand({ action: 'status' })">Status</button>
    <button class="secondary" onclick="sendCommand({ action: 'scan_wifi' })">Scan Wi-Fi</button>
  </section>
  <form id="wifi-form">
    <label>Wi-Fi network name<input name="ssid" required autocomplete="off"></label>
    <label>Wi-Fi password<input name="password" type="password" autocomplete="current-password"></label>
    <label><input name="hidden" type="checkbox" value="true" style="display:inline;width:auto;min-height:auto;margin-right:8px"> Hidden network</label>
    <div class="row">
      <button type="submit">Update Wi-Fi Settings</button>
      <button type="button" class="secondary" onclick="sendCommand({ action: 'try_connect_wifi' })">Try Connecting</button>
    </div>
  </form>
  <pre id="output"></pre>
</main>
<script>
const SERVICE_UUID = '9f0d0001-7b6d-4d2c-9f4f-6f70726f7601';
const COMMAND_UUID = '9f0d0002-7b6d-4d2c-9f4f-6f70726f7601';
const STATUS_UUID = '9f0d0003-7b6d-4d2c-9f4f-6f70726f7601';
const encoder = new TextEncoder();
const decoder = new TextDecoder();
let commandCharacteristic;
let statusCharacteristic;

function log(value) {
  document.getElementById('output').textContent =
    typeof value === 'string' ? value : JSON.stringify(value, null, 2);
}

async function connectBle() {
  if (!navigator.bluetooth) {
    log('Web Bluetooth is not available in this browser. Use Chrome/Edge on Android or desktop over HTTPS.');
    return;
  }
  const device = await navigator.bluetooth.requestDevice({
    filters: [{ services: [SERVICE_UUID] }],
    optionalServices: [SERVICE_UUID]
  });
  const server = await device.gatt.connect();
  const service = await server.getPrimaryService(SERVICE_UUID);
  commandCharacteristic = await service.getCharacteristic(COMMAND_UUID);
  statusCharacteristic = await service.getCharacteristic(STATUS_UUID);
  log(await readStatus());
}

async function sendCommand(command) {
  if (!commandCharacteristic) await connectBle();
  await commandCharacteristic.writeValue(encoder.encode(JSON.stringify(command)));
  log(await readStatus());
}

async function readStatus() {
  if (!statusCharacteristic) return 'Not connected';
  const value = await statusCharacteristic.readValue();
  return JSON.parse(decoder.decode(value));
}

document.getElementById('wifi-form').addEventListener('submit', async (event) => {
  event.preventDefault();
  const data = new FormData(event.target);
  await sendCommand({
    action: 'update_wifi_credentials',
    ssid: data.get('ssid'),
    password: data.get('password') || '',
    hidden: data.get('hidden') === 'true'
  });
});
</script>
</body>
</html>
